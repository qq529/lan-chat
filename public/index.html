<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAN Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <div id="sidebar-header">
        <h2>LAN Chat</h2>
        <div id="server-info"></div>
      </div>
      <div id="users-panel">
        <div id="users-title">在线用户 <span id="user-count">0</span></div>
        <ul id="users-list"></ul>
      </div>
      <div id="admin-panel">
        <div id="admin-title">管理</div>
        <button id="btn-clear-msgs" class="admin-btn">清空消息记录</button>
        <button id="btn-clear-all" class="admin-btn btn-danger">清除所有数据</button>
      </div>
    </div>
    <div id="main">
      <div id="messages"></div>
      <div id="input-area">
        <div id="login-panel">
          <input type="text" id="input-name" placeholder="输入昵称" maxlength="20">
          <button id="btn-join">加入聊天</button>
        </div>
        <div id="chat-panel" class="hidden">
          <label id="btn-image" class="image-btn" title="发送图片">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
            <input type="file" id="input-image" accept="image/*" hidden>
          </label>
          <input type="text" id="input-text" placeholder="输入消息，Enter 发送" maxlength="500">
          <button id="btn-send">发送</button>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
